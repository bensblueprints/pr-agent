version: "3.8"

services:
  pr-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-agent
    restart: unless-stopped
    environment:
      - XAI_API_KEY=${XAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
      - PORT=3000
    volumes:
      - pr-agent-data:/app/data
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pr-agent-http.rule=Host(`press.advancedmarketing.co`)"
      - "traefik.http.routers.pr-agent-http.entrypoints=http"
      - "traefik.http.routers.pr-agent-http.middlewares=redirect-to-https"
      - "traefik.http.routers.pr-agent.rule=Host(`press.advancedmarketing.co`)"
      - "traefik.http.routers.pr-agent.entrypoints=https"
      - "traefik.http.routers.pr-agent.tls=true"
      - "traefik.http.routers.pr-agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.pr-agent.loadbalancer.server.port=3000"

volumes:
  pr-agent-data:

networks:
  coolify:
    external: true
